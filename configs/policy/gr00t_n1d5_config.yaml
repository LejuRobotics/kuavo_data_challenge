hydra:  # Hydra 配置文件保存目录，仅供参数检查使用
  run:
    dir: ./outputs/train_hydra_save/singlerun/${now:%Y%m%d_%H%M%S}  # 单次运行目录
  sweep:
    dir: ./outputs/train_hydra_save/multirun/${now:%Y%m%d_%H%M%S}  # sweep并行时的根目录
    subdir: ${hydra:job.override_dirname}


task: "your_task_name"  # 自定义任务名称，如果不使用本地数据想使用huggingface官方数据，请指定，例如pusht，aloha_sim_insertion_human等
method: "your_method_name"  # 自定义方法名称
timestamp: ${now:%Y%m%d_%H%M%S}  # 自动获取的运行时时间戳
# 训练时模型参数的保存目录在outputs/train/<task>/<method>/<timestamp>中
repoid: "lerobot/${task}"  # lerobot新版本需指定这个，仅供参考，设置了即可
root: /your/path/to/your/lerobotdata/lerobot
# root: null  # 如果不使用本地数据想使用huggingface官方数据，请在task中指定，例如pusht，aloha_sim_insertion_human，此处就设置为null空
# 将去云端调用下载数据集

# 训练相关配置
training:
    output_directory: "outputs/train/${task}/${method}"  # 模型参数保存路径，默认这个结构，不要改动
    seed: 42  # 数据增广、训练模型的随机种子，便于复现
    max_epoch: 200  # 最大训练轮次，用于控制学习率调整器，与下述max_training_step相关

    save_freq_epoch: 50  # 模型参数保存频率，每50个epoch保存一次
    log_with: null  # 训练日志记录工具，由于服务器环境问题，暂时仅默认使用tensorboard
    log_freq: 1  # 进度条刷新频率，每1个迭代step
    device: "cuda" # 训练设备，目前只支持单卡，多卡请使用CUDA_VISIBLE_DEVICES=6指定环境变量后使用，cuda:6这种类似的可能会出错
    accumulation_steps: 1  # 梯度累积步数，自定义
    ema_power: 0.75  # 如果使用ema移动指数平均方法可使用这个参数，目前测试使用ema会掉性能，所以代码中不再支持

    batch_size: 32  # 批次大小
    num_workers: 2  # dataloader的num_workers，请根据自己训练电脑的配置选择，否则可能会卡死
    drop_last: False  # 是否丢弃最后一个不完整的batch

    # 最大训练步数，用于控制学习率调整器，如果指定了 `max_training_step`，则它将优先生效，否则，该值将根据上述的 `max_epoch` 自动确定。
    # `max_epoch` 和 `max_training_step` 不会同时生效。
    max_training_step: 40000  

    # resume training，断点续训
    resume: false
    resume_timestamp: "run_20251120_164240"  # 若开启，将从outputs/train/<task>/<method>/<resume_timestamp>中加载最后一个epoch参数续训

    scheduler_name: cosine  # 学习率调整器名称，仅在policy config中不包含该调度器时生效，否则会使用policy自带的调整器
    scheduler_warmup_steps: 500  # 学习率预热warm up步数

    # 数据增广相关的配置
    RGB_Augmenter:
      enable: True
      max_num_transforms: 1
      random_order: True
      tfs:
        notransform:
          weight: 3.0  # 占比权重
          type: "Identity"
          kwargs: {}
        brightness:
          weight: 1.0
          type: "ColorJitter"
          kwargs: {"brightness": [0.5, 1.5]}
        contrast:
          weight: 1.0
          type: "ColorJitter"
          kwargs: {"contrast": [0.5, 1.5]}
        saturation:
          weight: 1.0
          type: "ColorJitter"
          kwargs: {"saturation": [0.5, 1.5]}
        hue:
          weight: 1.0
          type: "ColorJitter"
          kwargs: {"hue": [-0.05, 0.05]}
        sharpness:
          weight: 1.0
          type: "SharpnessJitter"
          kwargs: {"sharpness": [0.5, 1.5]}
        random_mask:
          weight: 1.0
          type: RandomMask
          kwargs:
            mask_size: [0.15, 0.15]   # h_ratio, w_ratio
        random_border_cutout:
          weight: 1.0
          type: RandomBorderCutout
          kwargs:
            cut_ratio: 0.15
        gaussian_noise:
          weight: 1.0
          type: GaussianNoise
          kwargs:
            mean: 0.0
            std: 0.1
        gamma_correction:
          weight: 1.0
          type: GammaCorrection
          kwargs:
            gamma: [0.5, 2.0]
        

policy_name: gr00t_n1d5  # 策略类型，支持diffusion、act和gr00t_n1d5

# 策略相关配置
policy:
    _target_: kuavo_train.wrapper.policy.gr00t_n1d5.Gr00tN1d5ConfigWrapper.CustomGr00tN1d5ConfigWrapper  # 用于实例化
    
    # Basic policy settings
    n_obs_steps: 1  # 观测步数
    chunk_size: 32  # 动作块大小（horizon）
    n_action_steps: 32  # 动作步数
    
    # Dimension settings (must match pretrained GR00T model expectations)
    max_state_dim: 64  # 最大状态维度，较短的状态将被零填充
    max_action_dim: 32  # 最大动作维度，较短的动作将被零填充
    
    # Normalization settings
    normalization_mapping:  # RGB等同于VISUAL类型，此项在gr00t模型中是无效的，gr00t模型内部会自动min-max处理
      VISUAL: 
        _target_: lerobot.configs.types.NormalizationMode
        value: IDENTITY
      STATE: 
        _target_: lerobot.configs.types.NormalizationMode
        value: MEAN_STD
      ACTION: 
        _target_: lerobot.configs.types.NormalizationMode
        value: MEAN_STD
    
    # Image preprocessing
    image_size: [224, 224]  # 图像尺寸

    use_amp: False
    
    # GR00T model path (HuggingFace Hub ID or local path)
    base_model_path: "nvidia/GR00T-N1.5-3B"  # 预训练模型路径或HuggingFace Hub ID
    
    # HF repo ID (or local path) that hosts vocab.json and merges.txt for Eagle tokenizer
    tokenizer_assets_repo: "lerobot/eagle2hg-processor-groot-n1p5"
    
    # Embodiment tag to use for training
    embodiment_tag: "new_embodiment"  # 默认参数
    
    # Fine-tuning control arguments
    tune_llm: false
    tune_visual: true
    tune_projector: true
    tune_diffusion_model: true
    
    # LoRA parameters (currently not used, but kept for compatibility)
    lora_rank: 0  # LORA模型的秩，如果为0则不使用LORA
    lora_alpha: 16  # LORA模型的alpha值
    lora_dropout: 0.1  # LORA模型的dropout率
    lora_full_model: false  # 是否对完整模型使用LORA
    
    # Training parameters
    optimizer_lr: 0.0001  # 优化器学习率
    optimizer_betas: [0.95, 0.999]  # 优化器beta参数
    optimizer_eps: 1.0e-08  # 优化器epsilon参数
    optimizer_weight_decay: 1.0e-05  # 权重衰减
    warmup_ratio: 0.05  # 预热比例
    use_bf16: true  # 是否使用bfloat16混合精度训练
    
    # Dataset parameters
    video_backend: "decord"  # 视频后端，'decord' 或 'torchvision_av'
    balance_dataset_weights: true  # 是否在混合数据集中平衡数据集权重
    balance_trajectory_weights: true  # 是否按轨迹长度加权采样

    dataloader_num_workers: 8
    
    # Real-Time Chunking (RTC) configuration (optional)
    rtc_config: null  # 可以设置为RTCConfig对象以启用实时分块
    
    custom:  # 自定义设置，可以在这里添加额外的配置项
      action_head_mode: "single"  # 单臂填single，双臂写biped